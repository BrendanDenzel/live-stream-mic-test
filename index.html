<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push-to-Talk Broadcaster</title>
    <!-- Include Socket.io and LameJS MP3 Encoder via CDN -->
    <script src="https://socket.io"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        html, body { 
            height: 100%; 
            background: #0c0e12; 
            color: #dde2ea; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
        }
        .container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            padding: 20px; 
        }
        .card { 
            background: #13161c; 
            border: 1px solid #252a35; 
            border-radius: 8px; 
            padding: 40px; 
            max-width: 500px; 
            width: 100%; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
        }
        h1 { 
            font-size: 28px; 
            margin-bottom: 10px; 
            color: #fff; 
        }
        .subtitle { 
            font-size: 13px; 
            color: #8892a0; 
            margin-bottom: 30px; 
        }
        .section { 
            margin-bottom: 25px; 
        }
        .section-title { 
            font-size: 12px; 
            font-weight: 600; 
            color: #8892a0; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 10px; 
        }
        select { 
            width: 100%; 
            padding: 12px; 
            background: #191d24; 
            border: 1px solid #2e3440; 
            border-radius: 4px; 
            color: #dde2ea; 
            font-size: 13px; 
            cursor: pointer; 
            transition: border-color 0.2s; 
        }
        select:hover { 
            border-color: #2d7dd2; 
        }
        select:focus { 
            outline: none; 
            border-color: #4a9eff; 
        }
        .ptt-zone { 
            background: #1f242e; 
            border: 2px solid #2e3440; 
            border-radius: 8px; 
            padding: 40px 20px; 
            text-align: center; 
            user-select: none; 
            transition: all 0.2s; 
            cursor: pointer; 
        }
        .ptt-zone:hover { 
            border-color: #2d7dd2; 
        }
        .ptt-zone.active { 
            background: #c0392b; 
            border-color: #e74c3c; 
        }
        .ptt-label { 
            font-size: 11px; 
            color: #8892a0; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 10px; 
        }
        .ptt-text { 
            font-size: 24px; 
            font-weight: 700; 
            color: #2d7dd2; 
        }
        .ptt-zone.active .ptt-text { 
            color: #fff; 
        }
        .ptt-hint { 
            font-size: 11px; 
            color: #4a5568; 
            margin-top: 15px; 
        }
        .meters { 
            margin-bottom: 20px; 
        }
        .meter-label { 
            font-size: 11px; 
            color: #8892a0; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            margin-bottom: 8px; 
        }
        .meter-bar { 
            height: 4px; 
            background: #2e3440; 
            border-radius: 2px; 
            overflow: hidden; 
        }
        .meter-fill { 
            height: 100%; 
            background: #2d7dd2; 
            width: 0%; 
            transition: width 0.1s linear; 
            border-radius: 2px; 
        }
        .status-box { 
            background: #191d24; 
            border: 1px solid #2e3440; 
            border-radius: 4px; 
            padding: 12px; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 12px; 
        }
        .status-dot { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background: #4a5568; 
            flex-shrink: 0; 
        }
        .status-dot.ready { 
            background: #27ae60; 
            animation: blink 1s ease-in-out infinite; 
        }
        @keyframes blink { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.4; } 
        }
        .status-text { 
            color: #8892a0; 
        }
        .status-text.ready { 
            color: #27ae60; 
            font-weight: 500; 
        }
        .info-box { 
            background: #1f242e; 
            border: 1px solid #2e3440; 
            border-radius: 4px; 
            padding: 12px; 
            font-size: 11px; 
            color: #8892a0; 
            line-height: 1.6; 
        }
        .error { 
            background: #c0392b; 
            color: white; 
            padding: 12px; 
            border-radius: 4px; 
            margin-bottom: 20px; 
            font-size: 12px; 
            display: none; 
        }
        .error.show { 
            display: block; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📡 Push-to-Talk</h1>
            <p class="subtitle">Live broadcaster for testing</p>
            <div class="error" id="error-msg"></div>
            <div class="status-box">
                <div class="status-dot" id="status-dot"></div>
                <div class="status-text" id="status-text">Initializing...</div>
            </div>
            <div class="section">
                <div class="section-title">Microphone</div>
                <select id="mic-select">
                    <option value="">Loading microphones...</option>
                </select>
            </div>
            <div class="meters">
                <div class="meter-label">Mic Level</div>
                <div class="meter-bar">
                    <div class="meter-fill" id="mic-meter"></div>
                </div>
            </div>
            <div class="section">
                <div class="ptt-zone" id="ptt-btn">
                    <div class="ptt-label">Hold to Transmit</div>
                    <div class="ptt-text">🎤</div>
                    <div class="ptt-hint">Press & hold spacebar or click & hold</div>
                </div>
            </div>
            <div class="info-box">
                <strong>Stream URL:</strong><br>
                <code id="stream-url">https://onrender.com</code><br><br>
                Update your scanner code STREAM_URL to this value
            </div>
        </div>
    </div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>

<script>
const micSelect = document.getElementById('mic-select');
const pttBtn = document.getElementById('ptt-btn');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const micMeter = document.getElementById('mic-meter');
const errorMsg = document.getElementById('error-msg');
const streamUrlEl = document.getElementById('stream-url');

let audioContext;
let mediaStream;
let processor;
let analyser;
let socket;
let mp3Encoder;
let isTalking = false;
let currentMicId = null;
let backendUrl = null;

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');

    setTimeout(() => {
        errorMsg.classList.remove('show');
    }, 5000);
}

function updateStatus(text, ready = false) {
    statusText.textContent = text;
    statusDot.className = `status-dot ${ready ? 'ready' : ''}`;

    if (ready) {
        statusText.classList.add('ready');
    } else {
        statusText.classList.remove('ready');
    }
}

function showConnectionForm() {
    const form = prompt(
        'Enter your Render backend URL:\n(e.g. https://your-app.onrender.com)'
    );

    if (!form || !form.trim()) {
        updateStatus('No backend URL entered');
        return;
    }

    backendUrl = form.trim();
    streamUrlEl.textContent = `${backendUrl}/stream.mp3`;

    socket = io(backendUrl);

    socket.on('connect', () => {
        updateStatus('Connected to Backend', true);
        loadMicrophones();
    });

    socket.on('disconnect', () => {
        updateStatus('Disconnected');
    });

    socket.on('stream-status', (data) => {
        if (data.status === 'connected') {
            updateStatus('Streaming Live!', true);
        }

        if (data.status === 'error') {
            showError(data.message || 'Server error');
            stopTalking();
        }
    });
}

async function loadMicrophones() {
    try {
        await navigator.mediaDevices.getUserMedia({
            audio: true
        });

        const devices = await navigator.mediaDevices.enumerateDevices();
        const mics = devices.filter(d => d.kind === 'audioinput');

        micSelect.innerHTML = '';

        mics.forEach((mic, index) => {
            const option = document.createElement('option');
            option.value = mic.deviceId;
            option.textContent =
                mic.label || `Microphone ${index + 1}`;

            micSelect.appendChild(option);
        });

        if (mics.length > 0) {
            currentMicId = mics[0].deviceId;
        } else {
            showError('No microphones found');
        }
    } catch (err) {
        showError(`Error loading microphones: ${err.message}`);
    }
}

micSelect.addEventListener('change', () => {
    currentMicId = micSelect.value;

    if (isTalking) {
        stopTalking();
        setTimeout(startTalking, 100);
    }
});

async function startTalking() {
    if (isTalking) return;

    if (!socket || !socket.connected) {
        showError('Not connected to backend');
        return;
    }

    try {
        if (!audioContext) {
            audioContext = new (
                window.AudioContext ||
                window.webkitAudioContext
            )({
                sampleRate: 44100
            });
        }

        mediaStream = await navigator.mediaDevices.getUserMedia({
            audio: {
                deviceId: currentMicId
                    ? { exact: currentMicId }
                    : undefined,
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false
            }
        });

        socket.emit('start-stream');

        mp3Encoder = new lamejs.Mp3Encoder(
            1,
            44100,
            128
        );

        const source =
            audioContext.createMediaStreamSource(mediaStream);

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;

        processor =
            audioContext.createScriptProcessor(
                4096,
                1,
                1
            );

        processor.onaudioprocess = (e) => {
            if (!isTalking) return;

            const float32Samples =
                e.inputBuffer.getChannelData(0);

            const int16Samples = new Int16Array(
                float32Samples.length
            );

            for (
                let i = 0;
                i < float32Samples.length;
                i++
            ) {
                int16Samples[i] =
                    Math.max(
                        -1,
                        Math.min(1, float32Samples[i])
                    ) * 0x7fff;
            }

            const mp3Data =
                mp3Encoder.encodeBuffer(int16Samples);

            if (mp3Data.length > 0) {
                socket.emit(
                    'audio-chunk',
                    mp3Data.buffer
                );
            }
        };

        source.connect(analyser);
        source.connect(processor);

        processor.connect(audioContext.destination);

        isTalking = true;
        pttBtn.classList.add('active');

        updateStatus('Transmitting...', true);

        monitorMicLevel();
    } catch (err) {
        showError(`Mic error: ${err.message}`);
    }
}

function stopTalking() {
    if (!isTalking) return;

    isTalking = false;

    pttBtn.classList.remove('active');
    micMeter.style.width = '0%';

    if (processor) {
        processor.disconnect();
        processor = null;
    }

    if (mediaStream) {
        mediaStream
            .getTracks()
            .forEach(track => track.stop());

        mediaStream = null;
    }

    if (mp3Encoder) {
        const remaining = mp3Encoder.flush();

        if (
            remaining.length > 0 &&
            socket &&
            socket.connected
        ) {
            socket.emit(
                'audio-chunk',
                remaining.buffer
            );
        }
    }

    updateStatus('Connected to Backend', true);
}

function monitorMicLevel() {
    if (!isTalking || !analyser) return;

    const dataArray = new Uint8Array(
        analyser.frequencyBinCount
    );

    analyser.getByteFrequencyData(dataArray);

    const average =
        dataArray.reduce((a, b) => a + b, 0) /
        dataArray.length;

    const level = Math.min(
        100,
        (average / 255) * 150
    );

    micMeter.style.width = `${level}%`;

    requestAnimationFrame(monitorMicLevel);
}

pttBtn.addEventListener(
    'mousedown',
    startTalking
);

pttBtn.addEventListener(
    'mouseup',
    stopTalking
);

pttBtn.addEventListener(
    'mouseleave',
    stopTalking
);

document.addEventListener('keydown', (e) => {
    if (
        e.code === 'Space' &&
        !isTalking &&
        backendUrl
    ) {
        e.preventDefault();
        startTalking();
    }
});

document.addEventListener('keyup', (e) => {
    if (
        e.code === 'Space' &&
        isTalking
    ) {
        e.preventDefault();
        stopTalking();
    }
});

showConnectionForm();

navigator.mediaDevices.addEventListener(
    'devicechange',
    loadMicrophones
);
</script>

</body>
</html>
